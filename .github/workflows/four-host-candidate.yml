  aggregate:
    needs: [test-linux-amd64, test-windows-amd64, test-darwin-arm64, test-darwin-amd64]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out Sealbuild
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Download Linux candidate
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: sealbuild-linux-amd64-candidate
          path: ${{ runner.temp }}/candidates/linux
      - name: Download Windows candidate
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: sealbuild-windows-amd64-candidate
          path: ${{ runner.temp }}/candidates/windows
      - name: Download Darwin ARM64 candidate
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: sealbuild-darwin-arm64-candidate
          path: ${{ runner.temp }}/candidates/darwin-arm64
      - name: Download Darwin AMD64 candidate
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: sealbuild-darwin-amd64-candidate
          path: ${{ runner.temp }}/candidates/darwin-amd64
      - name: Verify platform checksums and aggregate exact release files
        shell: bash
        run: |
          set -euo pipefail
          for platform in linux windows darwin-arm64 darwin-amd64; do
            (cd "$RUNNER_TEMP/candidates/$platform" && sha256sum --check platform-checksums.txt)
          done
          input="$RUNNER_TEMP/release-input"
          mkdir "$input"
          cp "$RUNNER_TEMP/candidates/linux/sealbuild-linux-amd64" "$input/"
          cp "$RUNNER_TEMP/candidates/windows/sealbuild-windows-amd64.exe" "$input/"
          cp "$RUNNER_TEMP/candidates/darwin-arm64/sealbuild-darwin-arm64" "$input/"
          cp "$RUNNER_TEMP/candidates/darwin-amd64/sealbuild-darwin-amd64" "$input/"
          version=dev
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then version="$GITHUB_REF_NAME"; fi
          epoch=$(git show -s --format=%ct "$GITHUB_SHA")
          built_at=$(date -u -d "@$epoch" '+%Y-%m-%dT%H:%M:%SZ')
          go run ./scripts/dev/aggregatecandidate \
            --input "$input" \
            --output "$RUNNER_TEMP/release" \
            --version "$version" \
            --commit "$GITHUB_SHA" \
            --built-at "$built_at"
      - name: Upload unified four-host candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sealbuild-four-host-candidate
          if-no-files-found: error
          retention-days: 14
          path: ${{ runner.temp }}/release

  publish-rc:
    needs: aggregate
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Validate exact RC tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[1-9][0-9]*$ ]]; then
            echo "invalid RC tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi
      - name: Download unified candidate
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: sealbuild-four-host-candidate
          path: ${{ runner.temp }}/release
      - name: Verify and publish immutable Pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/release"
          sha256sum --check checksums.txt
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub Release already exists: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          printf '%s\n' \
            'Sealbuild four-host release candidate.' \
            '' \
            'All artifacts passed GitHub Actions Dockerfile builds for linux/amd64.' \
            'Final Windows Home, Linux, Apple Silicon Mac, and Intel Mac device acceptance is still required.' \
            > "$RUNNER_TEMP/release-notes.md"
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --prerelease \
            --title "$GITHUB_REF_NAME" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            sealbuild-darwin-arm64 \
            sealbuild-darwin-amd64 \
            sealbuild-linux-amd64 \
            sealbuild-windows-amd64.exe \
            checksums.txt
